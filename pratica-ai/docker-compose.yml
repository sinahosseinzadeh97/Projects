# === FILE: docker-compose.yml ===
# Development environment for Sinistri FNOL Agent
# Usage: docker-compose up --build -d

services:
  app:
    build: .
    ports:
      - "4177:4177"
    environment:
      - DATABASE_URL=postgresql+asyncpg://sinistri:password@db:5432/pratica_ai_db
      - SECRET_KEY=${SECRET_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_GENAI_USE_VERTEXAI=False
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./live_demo:/app/live_demo  # Hot reload for frontend
    restart: unless-stopped
    networks:
      - sinistri-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pratica_ai_db
      POSTGRES_USER: sinistri
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sinistri -d pratica_ai_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sinistri-net

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sinistri-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - sinistri-net

volumes:
  postgres_data:

networks:
  sinistri-net:
    driver: bridge
